data_configs:
  task_type: permeability
  # 데이터는 FDD 플랫폼 메인화면 Data information 탭의 "실험 데이터 항목 선택"에서 확인할 수 있습니다.
  # 예를 들어 "Brain penetration" task의 경우 "brain_penetration" (only lowercase, space -> _ ) 이 raw_datas의 key값이 됩니다.
  # raw_datas['permeability'] 는 permeability task 데이터가 모아진 데이터프레임을 의미합니다.
  max_length: 1024
  batch_size: 4
  gra_accu_steps: 10

model_configs:
  pretrained_model_name_or_path: 'SmolLM2-135M-Instruct'
  # 여기 작성된 모델 경로는, minio에 미리 업로드되어있는 디렉토리를 다운로드받기 위한 키값입니다. 업로드된 폴더(또는 파일)명과 똑같이 작성해주세요.
  lora_config:
    lora_alpha: 16
    lora_dropout: 0.1
    r: 64
    bias: "none"
    task_type: "CAUSAL_LM"

trainer_configs:
  learning_rate: 5e-4
  per_device_train_batch_size: ${data_configs.batch_size}
  per_device_eval_batch_size: ${data_configs.batch_size}
  gradient_accumulation_steps: ${data_configs.gra_accu_steps}
  seed: 0
  # check point & output 비활성화 필수!!
  # 체크포인트 저장 및 서드파티 로깅(tensorboard, wandb 등) 불가능합니다!
  output_dir: /tmp/checkpoint
  save_strategy: "no"
  report_to: []
  logging_strategy: "no"
  disable_tqdm: true